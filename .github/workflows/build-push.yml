name: Build and Push to GHCR

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.vars.outputs.sha_short }}
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          exit-code: '0'

      - name: Summarize Trivy results
        id: summary
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json)
          MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-report.json)
          LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-report.json)
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "medium=$MEDIUM" >> "$GITHUB_OUTPUT"
          echo "low=$LOW" >> "$GITHUB_OUTPUT"

      - name: Notify Slack - image quality
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "đź”Ť *Scan Trivy* â€” `${{ steps.image.outputs.name }}:${{ steps.vars.outputs.sha_short }}`\nđź”´ Critical: ${{ steps.summary.outputs.critical }}   đźź  High: ${{ steps.summary.outputs.high }}   đźźˇ Medium: ${{ steps.summary.outputs.medium }}   âšŞ Low: ${{ steps.summary.outputs.low }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Voir le run>"
            }' \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Update k8s manifest with new image tag
        run: |
          yq -i '.spec.template.spec.containers[0].image = "${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.vars.outputs.sha_short }}"' k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: deploy ${{ steps.vars.outputs.sha_short }} [skip ci]"
          git push