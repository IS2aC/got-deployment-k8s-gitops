<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game of Thrones — Personnages</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0a0a0f;
      background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a0f 60%);
      color: #d4af37;
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 32px;
    }

    /* HEADER */
    header { text-align: center; margin-bottom: 32px; }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: clamp(2px, 1vw, 6px);
      text-transform: uppercase;
      background: linear-gradient(135deg, #d4af37, #f5e27a, #b8860b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.5vw, 0.85rem);
      letter-spacing: 4px;
      color: #7a6a3a;
      margin-top: 8px;
    }

    .divider {
      width: clamp(100px, 30vw, 200px);
      height: 1px;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
      margin: 14px auto;
    }

    /* CAROUSEL WRAPPER */
    .carousel-wrapper {
      position: relative;
      width: 100%;
      max-width: 1100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 2vw, 20px);
      perspective: 1200px;
      height: clamp(340px, 55vw, 500px);
      width: 100%;
      overflow: hidden;
    }

    /* CARDS */
    .card {
      width: clamp(160px, 24vw, 260px);
      height: clamp(300px, 46vw, 440px);
      border-radius: 14px;
      overflow: hidden;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(212, 175, 55, 0.12);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    .card.active {
      transform: scale(1.08);
      border-color: rgba(212, 175, 55, 0.6);
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.22), 0 16px 48px rgba(0,0,0,0.8);
      z-index: 10;
    }

    .card.side {
      transform: scale(0.86) translateZ(-80px);
      opacity: 0.5;
      filter: brightness(0.55);
    }

    .card.far {
      transform: scale(0.7) translateZ(-160px);
      opacity: 0.2;
      filter: brightness(0.35);
    }

    /* Sur mobile : cacher les cartes far */
    @media (max-width: 600px) {
      .card.far { display: none; }
      .card.side { opacity: 0.35; filter: brightness(0.4); }
      .card { width: clamp(140px, 40vw, 200px); height: clamp(260px, 60vw, 360px); }
    }

    .card-image {
      width: 100%;
      height: 62%;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    .card-image-fallback {
      width: 100%;
      height: 62%;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900;
      color: rgba(212, 175, 55, 0.35);
    }

    .card-body {
      padding: clamp(10px, 2vw, 18px) clamp(12px, 2.5vw, 20px);
      background: linear-gradient(to bottom, rgba(10,10,15,0.94), rgba(10,10,15,1));
      height: 38%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.7rem, 1.4vw, 1rem);
      font-weight: 700;
      color: #f5e27a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-title-role {
      font-size: clamp(0.58rem, 1vw, 0.72rem);
      color: #7a6a3a;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }

    .card-house {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.55rem, 0.9vw, 0.68rem);
      color: #d4af37;
      background: rgba(212, 175, 55, 0.08);
      border: 1px solid rgba(212, 175, 55, 0.25);
      padding: 2px 7px;
      border-radius: 4px;
    }

    .card-status {
      font-size: clamp(0.55rem, 0.9vw, 0.68rem);
      font-weight: 300;
      letter-spacing: 1px;
    }
    .card-status.alive { color: #4caf82; }
    .card-status.dead  { color: #cf6679; }

    .card-actor {
      font-size: clamp(0.55rem, 0.9vw, 0.7rem);
      color: #5a4a2a;
      font-style: italic;
      margin-top: 5px;
    }

    /* QUOTE */
    .quote-panel {
      margin-top: 28px;
      text-align: center;
      width: 100%;
      max-width: 560px;
      padding: 0 20px;
      min-height: 56px;
    }

    .quote-panel p {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.75rem, 2vw, 1rem);
      font-style: italic;
      color: #a89050;
      letter-spacing: 1px;
    }

    .quote-panel span {
      display: block;
      font-size: clamp(0.6rem, 1.2vw, 0.72rem);
      color: #5a4a2a;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* NAV BUTTONS */
    .nav-btn {
      background: rgba(212, 175, 55, 0.07);
      border: 1px solid rgba(212, 175, 55, 0.25);
      color: #d4af37;
      width: clamp(36px, 5vw, 48px);
      height: clamp(36px, 5vw, 48px);
      border-radius: 50%;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      cursor: pointer;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      flex-shrink: 0;
    }
    .nav-btn:hover { background: rgba(212, 175, 55, 0.18); border-color: #d4af37; }
    .nav-btn.prev { left: 0; }
    .nav-btn.next { right: 0; }

    /* DOTS */
    .dots {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      justify-content: center;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2a2010;
      cursor: pointer;
      transition: all 0.3s;
    }
    .dot.active { background: #d4af37; width: 22px; border-radius: 3px; }

    /* COUNTER */
    .counter {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: #3a2a10;
      letter-spacing: 2px;
      margin-top: 10px;
    }

    footer {
      margin-top: 32px;
      font-size: clamp(0.55rem, 1.2vw, 0.65rem);
      letter-spacing: 3px;
      color: #1e1810;
      font-family: 'Cinzel', serif;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>Game of Thrones</h1>
    <div class="divider"></div>
    <p>Les Personnages</p>
  </header>

  <div class="carousel-wrapper">
    <button class="nav-btn prev" onclick="move(-1)">&#8249;</button>

    <div class="carousel" id="carousel">
      {% for char in characters %}
      <div class="card" id="card-{{ loop.index0 }}" onclick="goTo({{ loop.index0 }})"
           style="background: linear-gradient(160deg, {{ char.color }}, #0a0a0f);">
        <img
          class="card-image"
          src="{{ char.image }}"
          alt="{{ char.name }}"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
        />
        <div class="card-image-fallback" style="background: {{ char.color }};">
          {{ char.name[0] }}
        </div>
        <div class="card-body">
          <div>
            <div class="card-name">{{ char.name }}</div>
            <div class="card-title-role">{{ char.title }}</div>
          </div>
          <div>
            <div class="card-meta">
              <span class="card-house">{{ char.house }}</span>
              <span class="card-status {{ 'alive' if 'Vivant' in char.status or 'Vivante' in char.status else 'dead' }}">
                ● {{ char.status }}
              </span>
            </div>
            <div class="card-actor">{{ char.actor }}</div>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>

    <button class="nav-btn next" onclick="move(1)">&#8250;</button>
  </div>

  <div class="quote-panel">
    <p id="quote-text"></p>
    <span id="quote-author"></span>
  </div>

  <div class="dots" id="dots">
    {% for char in characters %}
    <div class="dot" id="dot-{{ loop.index0 }}" onclick="goTo({{ loop.index0 }})"></div>
    {% endfor %}
  </div>

  <div class="counter" id="counter"></div>

  <footer>« When you play the game of thrones, you win or you die. »</footer>

  <script>
    const total = {{ characters | length }};
    const quotes = [
      {% for char in characters %}
      { text: {{ char.quote | tojson }}, author: "— {{ char.name }}" },
      {% endfor %}
    ];

    let current = 0;

    function getClass(index) {
      const diff = ((index - current) % total + total) % total;
      if (diff === 0) return 'active';
      if (diff === 1 || diff === total - 1) return 'side';
      return 'far';
    }

    function render() {
      for (let i = 0; i < total; i++) {
        document.getElementById('card-' + i).className = 'card ' + getClass(i);
        document.getElementById('dot-' + i).className = 'dot' + (i === current ? ' active' : '');
      }
      document.getElementById('quote-text').textContent  = '"' + quotes[current].text + '"';
      document.getElementById('quote-author').textContent = quotes[current].author;
      document.getElementById('counter').textContent      = (current + 1) + ' / ' + total;
    }

    function move(dir) {
      current = ((current + dir) % total + total) % total;
      render();
    }

    function goTo(index) {
      current = index;
      render();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  move(-1);
      if (e.key === 'ArrowRight') move(1);
    });

    // Swipe mobile
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    document.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) move(diff > 0 ? 1 : -1);
    });

    render();
  </script>
</body>
</html>
